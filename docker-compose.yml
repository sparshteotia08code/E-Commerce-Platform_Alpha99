version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: alpha99_postgres
    restart: always
    environment:
      POSTGRES_USER: alpha_user
      POSTGRES_PASSWORD: alpha_password
      POSTGRES_DB: alpha_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: alpha99_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
    container_name: alpha99_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_USER=alpha_user
      - DB_PASSWORD=alpha_password
      - DB_NAME=alpha_db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_alpha_key_99
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: alpha99_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
